    <path d="M-190-95h380v-18c0-15-13-27-28-27h-324c-15 0-28 12-28 27z" fill="#ffe071"/>
    <text x="-128" y="-42" font-family="Georgia, serif" font-size="72" font-weight="900" fill="#1f2c3a">A</text>
