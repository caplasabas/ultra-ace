<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1280" viewBox="0 0 720 1280" role="img" aria-labelledby="title desc">
  <title id="title">UltraAce free spins promotion</title>
  <desc id="desc">Promotional side banner for free spins and prize events.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#061b20"/>
      <stop offset="0.48" stop-color="#0a4b5a"/>
      <stop offset="1" stop-color="#020709"/>
    </linearGradient>
    <radialGradient id="burst" cx="50%" cy="38%" r="62%">
      <stop offset="0" stop-color="#eaffff" stop-opacity="0.9"/>
      <stop offset="0.28" stop-color="#3ee8ff" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#0089ff" stop-opacity="0"/>
