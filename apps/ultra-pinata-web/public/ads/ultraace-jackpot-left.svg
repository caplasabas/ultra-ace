<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1280" viewBox="0 0 720 1280" role="img" aria-labelledby="title desc">
  <title id="title">UltraAce jackpot promotion</title>
  <desc id="desc">Promotional side banner for a jackpot campaign.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#240707"/>
      <stop offset="0.42" stop-color="#5d1309"/>
      <stop offset="1" stop-color="#090403"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="28%" r="58%">
      <stop offset="0" stop-color="#ffe08a" stop-opacity="0.9"/>
      <stop offset="0.28" stop-color="#ff9b24" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#ff5a00" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="720" height="1280" fill="url(#bg)"/>
  <rect width="720" height="1280" fill="url(#glow)"/>
  <path d="M54 58h612v1164H54z" fill="none" stroke="#d8a84b" stroke-width="6" opacity="0.72"/>
  <path d="M74 78h572v1124H74z" fill="none" stroke="#fff2b7" stroke-width="2" opacity="0.35"/>
  <g filter="url(#shadow)">
    <text x="360" y="190" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="84" fill="#fff5c7">ULTRAACE</text>
    <text x="360" y="285" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="76" fill="#ffcf4d">JACKPOT</text>
    <text x="360" y="388" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="112" fill="#ffffff">250K</text>
  </g>
  <g transform="translate(360 590)" filter="url(#shadow)">
    <circle r="160" fill="#ffd35a"/>
    <circle r="132" fill="#f08b19"/>
    <circle r="104" fill="#ffdf86"/>
    <text y="40" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="158" fill="#8b2b06">₱</text>
  </g>
  <text x="360" y="850" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="900" fill="#fff4d8">PLAY NOW FOR A</text>
  <text x="360" y="910" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="900" fill="#fff4d8">CHANCE TO WIN</text>
  <rect x="104" y="990" width="512" height="94" rx="10" fill="#0d0a08" stroke="#ffcf4d" stroke-width="4"/>
  <text x="360" y="1054" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="#ffdf75">ASK STAFF FOR DETAILS</text>
  <text x="360" y="1165" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#e9c891" opacity="0.9">Demo promotional material</text>
</svg>
